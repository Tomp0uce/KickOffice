server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # X-Frame-Options removed: Office add-ins must run in an iframe inside Outlook/Word/Excel/PowerPoint.
    # SAMEORIGIN was blocking the add-in from loading. frame-ancestors in CSP replaces it.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://appsforoffice.microsoft.com; style-src 'self' 'unsafe-inline' https://appsforoffice.microsoft.com https://outlook.cloud.microsoft; img-src 'self' data: https: blob:; connect-src 'self' https: wss:; font-src 'self' data: https://appsforoffice.microsoft.com; frame-src 'self' https://appsforoffice.microsoft.com https://telemetryservice.firstpartyapps.oaspapps.com; frame-ancestors 'self' https://*.microsoft.com https://*.office.com https://*.office365.com https://*.microsoftonline.com https://*.outlookoffice.com;" always;
}
