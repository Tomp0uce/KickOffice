services:
  # One-shot init container: creates the backend log directory on the HOST
  # with the correct ownership for the non-root node user (UID/GID 1000).
  # Without this step, Docker would create the bind-mount directory as root
  # and the container would silently fail to write any log files.
  logs-init:
    image: node:22-slim
    container_name: kickoffice-logs-init
    volumes:
      - ./backend/logs:/app/logs
    # node:22-slim runs as root by default; the node user inside is UID/GID 1000.
    command: >
      /bin/sh -c "
        mkdir -p /app/logs/feedback /app/logs/frontend &&
        chown -R 1000:1000 /app/logs &&
        echo 'Log directories ready.'
      "
    restart: "no"

  manifest-gen:
    image: node:22-slim
    container_name: kickoffice-manifest-gen
    volumes:
      - ./scripts:/app/scripts:ro
      - ./manifests-templates:/app/manifests-templates:ro
      - ./generated-manifests:/app/generated-manifests
    working_dir: /app
    environment:
      - SERVER_IP=${SERVER_IP}
      - FRONTEND_PORT=${FRONTEND_PORT}
      - BACKEND_PORT=${BACKEND_PORT}
      - PUBLIC_FRONTEND_URL=${PUBLIC_FRONTEND_URL:-}
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL:-}
    command: ["node", "scripts/generate-manifests.js"]
    restart: "no"

  kickoffice-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kickoffice-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env
    environment:
      - PORT=${BACKEND_PORT}
      - FRONTEND_URL=http://${SERVER_IP}:${FRONTEND_PORT}
      - PUBLIC_FRONTEND_URL=${PUBLIC_FRONTEND_URL:-}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:${BACKEND_PORT}/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      # Persist all backend log files to the host filesystem.
      # Feedback JSON, frontend error logs, tool-usage JSONL, rotating daily
      # server logs — everything in /app/logs/ survives container restarts.
      - ./backend/logs:/app/logs
    depends_on:
      manifest-gen:
        condition: service_completed_successfully
      logs-init:
        condition: service_completed_successfully
    networks:
      - kickoffice

  kickoffice-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://${SERVER_IP}:${BACKEND_PORT}}
        VITE_APP_VERSION: ${APP_VERSION:-}
        VITE_REQUEST_TIMEOUT_MS: ${VITE_REQUEST_TIMEOUT_MS:-45000}
    container_name: kickoffice-frontend
    restart: unless-stopped
    ports:
      # IC2: Map to 8080 (nginx-unprivileged internal port)
      - "${FRONTEND_PORT}:8080"
    depends_on:
      manifest-gen:
        condition: service_completed_successfully
      kickoffice-backend:
        condition: service_healthy
    networks:
      - kickoffice

networks:
  kickoffice:
    driver: bridge
